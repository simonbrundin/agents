apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: software-agent-db-user-secret
spec:
  refreshInterval: "24h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: software-agent-db-user
    creationPolicy: Owner
    template:
      mergePolicy: Merge
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        password: "{{ .password }}"
        username: "user"
        jdbc-uri: "jdbc:postgresql://software-agent-db-rw.software-agent.svc.cluster.local:5432/software-agent?password={{ .password }}&user=user"
        uri: "postgresql://user:{{ .password }}@software-agent-db-rw.software-agent.svc.cluster.local:5432/software-agent"
        pgpass: "software-agent-db-rw.software-agent.svc.cluster.local:5432:software-agent:user:{{ .password }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: pg-password-generator
